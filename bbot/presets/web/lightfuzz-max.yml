description: Discover web parameters and lightly fuzz them for vulnerabilities, with the most intense discovery techniques

flags:
  - web-paramminer

modules:
  - httpx
  - lightfuzz
  - robots
  - badsecrets
  - hunt
  - reflected_parameters
  - portfilter

config:
  url_querystring_remove: False
  url_querystring_collapse: False
  modules:
    lightfuzz:
      force_common_headers: True
      enabled_submodules: [cmdi,crypto,nosqli,path,serial,sqli,ssti,xss]
      disable_post: False
    excavate:
      retain_querystring: True
      speculate_params: True

conditions:
- |
  {% if config.web.spider_distance == 0 %}
    {{ warn("The lightfuzz-max preset works much better with spider enabled! Consider adding 'spider' or 'spider-intense' preset.") }}
  {% endif %}