description: Discover client-side web vulnerabilities using CodeQL. Limit to "error" level findings, and only analyze the DOM itself.

modules:
  - httpx
  - portfilter
  - codeql

config:
  url_querystring_remove: False
  modules:
    excavate:
      retain_querystring: True
    codeql:
      mode: dom_only
      min_severity: error
