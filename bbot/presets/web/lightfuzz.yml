description: Discover web parameters and lightly fuzz them for vulnerabilities, without some of the more intense discovery techniques

modules:
  - httpx
  - lightfuzz
  - badsecrets
  - hunt
  - reflected_parameters
  - portfilter
  
config:
  url_querystring_remove: False
  url_querystring_collapse: True
  modules:
    lightfuzz:
      force_common_headers: False
      enabled_submodules: [cmdi,crypto,nosqli,path,serial,sqli,ssti,xss]
      disable_post: True
    excavate:
      retain_querystring: True

conditions:
  - |
    {% if config.web.spider_distance == 0 %}
      {{ warn("Lightfuzz works much better with spider enabled! Consider adding 'spider' or 'spider-intense' preset.") }}
    {% endif %}