description: Discover web parameters and lightly fuzz them for vulnerabilities, with more intense discovery techniques

flags:
  - web-paramminer

modules:
  - httpx
  - lightfuzz
  - robots
  - badsecrets
  - hunt
  - reflected_parameters
  - portfilter

config:
  url_querystring_remove: False
  url_querystring_collapse: True
  modules:
    lightfuzz:
      force_common_headers: False
      enabled_submodules: [cmdi,crypto,nosqli,path,serial,sqli,ssti,xss]
      disable_post: False
    excavate:
      retain_querystring: True

conditions:
  - |
    {% if config.web.spider_distance == 0 %}
      {{ warn("The lightfuzz-intense preset works much better with spider enabled! Consider adding 'spider' or 'spider-intense' preset.") }}
    {% endif %}